{# templates/admin.html (ADD THIS BLOCK somewhere in the authed dashboard area) #}

<div class="mt-6 rounded-3xl bg-white border border-slate-200 shadow-sm p-6">
  <div class="text-xs font-semibold text-slate-500">PRINT</div>
  <div class="mt-2 font-semibold">Windshield voting cards</div>
  <div class="mt-1 text-sm text-slate-600">
    Front-only prints the voting sheet. Duplex adds a check-in QR on the back for owner registration.
  </div>

  <div class="mt-3 flex items-center gap-2">
    <input id="adminPrintBack" type="checkbox" class="h-4 w-4">
    <label for="adminPrintBack" class="text-sm text-slate-800">
      Include check-in backs (duplex)
    </label>
  </div>

  <div class="mt-4 flex flex-wrap gap-3">
    <a id="adminPrintAllBtn"
       class="btn btn-primary"
       href="{{ url_for('admin_print_cards_pdf') }}?all=1"
       target="_blank">
      Download PDF (All Cars)
    </a>

    <a class="btn btn-outline"
       href="{{ url_for('admin_placeholders') }}">
      Go to Placeholder Cars
    </a>
  </div>
</div>

<script>
(function () {
  const cb = document.getElementById("adminPrintBack");
  const btn = document.getElementById("adminPrintAllBtn");
  if (!cb || !btn) return;

  const baseHref = btn.getAttribute("href").split("&back=")[0].split("?back=")[0];

  function updateHref() {
    let href = baseHref;
    if (cb.checked) {
      href += (href.includes("?") ? "&" : "?") + "back=1";
    }
    btn.setAttribute("href", href);
  }

  cb.addEventListener("change", updateHref);
  updateHref();
})();
</script>
